name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore CognitiveBudget.sln
      - name: Check for vulnerable packages
        run: |
          dotnet list CognitiveBudget.sln package --vulnerable --include-transitive 2>&1 | tee vuln.log
          if grep -q -E "Critical|High" vuln.log; then
            echo "::error::High/Critical vulnerable packages found"; exit 1
          fi
      - name: Build
        run: dotnet build CognitiveBudget.sln --no-restore -c Release
      - name: Run tests
        run: |
          dotnet test CognitiveBudget.sln --no-build -c Release --verbosity normal \
            --collect:"XPlat Code Coverage" --results-directory ./coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./coverage/**/coverage.cobertura.xml
          if-no-files-found: ignore

  # Optional: publish a Docker image to Docker Hub. Skips automatically unless the
  # DOCKER_HUB_USERNAME / DOCKER_HUB_ACCESS_TOKEN secrets are set. Not required
  # when deploying on Render (which builds the image from the repo itself).
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Build and push image
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/bujetr:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/bujetr:${{ github.sha }}
      - name: No Docker Hub credentials — skipping publish
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: echo "DOCKER_HUB_USERNAME secret not set; skipping image publish (not needed for Render)."
