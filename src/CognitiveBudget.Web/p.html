<div class="auth-card">
    <div class="card"><div class="card-body p-4">
        <h3 class="text-center mb-1"><i class="bi bi-brain text-primary"></i> Welcome back</h3>
        <p class="text-center text-muted mb-4">Sign in to your CognitiveBudget account.</p>

        <form method="post" action="/Account/Login">
            
            <div class="mb-3">
                <label class="form-label" for="Email">Email</label>
                <input class="form-control" autocomplete="username" type="email" data-val="true" data-val-email="The Email field is not a valid e-mail address." data-val-required="The Email field is required." id="Email" name="Email" value="" />
                <span class="text-danger field-validation-valid" data-valmsg-for="Email" data-valmsg-replace="true"></span>
            </div>
            <div class="mb-3">
                <label class="form-label" for="Password">Password</label>
                <input class="form-control" type="password" autocomplete="current-password" data-val="true" data-val-required="The Password field is required." id="Password" name="Password" />
                <span class="text-danger field-validation-valid" data-valmsg-for="Password" data-valmsg-replace="true"></span>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check m-0">
                    <input class="form-check-input" type="checkbox" data-val="true" data-val-required="The RememberMe field is required." id="RememberMe" name="RememberMe" value="true" />
                    <label class="form-check-label" for="RememberMe">RememberMe</label>
                </div>
                <a class="small" href="/Account/ForgotPassword">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> Login</button>

        <p class="text-center text-muted mt-3 mb-0 small">
            No account? <a href="/Account/Register">Create one</a>
