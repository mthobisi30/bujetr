version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cognitive_budget_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cognitive_budget
      POSTGRES_USER: cb_user
      POSTGRES_PASSWORD: cb_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cb_user -d cognitive_budget"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Web Application ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cognitive_budget_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=cognitive_budget;
        Username=cb_user;Password=cb_password
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs

  # ── pgAdmin (optional dev tool) ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cognitive_budget_pgadmin
    restart: unless-stopped
    profiles: ["dev"]           # Only starts with: docker compose --profile dev up
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cognitivedbudget.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  postgres_data:
  app_logs:
