services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cognitive_budget_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cognitive_budget}
      POSTGRES_USER: ${POSTGRES_USER:-cb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bind to localhost only — the web container reaches the db over the compose
    # network; the published port is just for local tooling (psql/pgAdmin).
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cb_user} -d ${POSTGRES_DB:-cognitive_budget}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Web Application ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cognitive_budget_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # All app settings come from the .env file in this folder (copy .env.example).
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # Connection string for the bundled Postgres container. To use an EXTERNAL
      # database (e.g. Neon) instead, comment out the line below and set
      # ConnectionStrings__DefaultConnection in your .env file.
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-cognitive_budget};Username=${POSTGRES_USER:-cb_user};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── pgAdmin (optional dev tool) ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cognitive_budget_pgadmin
    restart: unless-stopped
    profiles: ["dev"]           # Only starts with: docker compose --profile dev up
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cognitivebudget.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:5050:80"

volumes:
  postgres_data:
  app_logs:
